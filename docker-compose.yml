# Magic Sky Frontend - Storefront
# Uso: cd frontend && docker compose up -d
# Requiere backend corriendo (cd backend && docker compose up -d)

services:
  frontend:
    image: node:20
    container_name: magic-sky-frontend
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    environment:
      CI: "true"
      VITE_GRAPHQL_URI: http://localhost:4000/graphql
    command: sh -c "corepack enable pnpm && pnpm install && pnpm dev --host"
